<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WafaHell | Access Control</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    
    <style>
        /* Animação suave de entrada */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in {
            animation: fadeIn 0.6s ease-out forwards;
        }

        /* Padrão de Fundo Cibernético (CSS Puro - Funciona Offline) */
        .cyber-grid {
            background-size: 40px 40px;
            background-image: 
                linear-gradient(to right, rgba(30, 41, 59, 0.5) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(30, 41, 59, 0.5) 1px, transparent 1px);
            mask-image: radial-gradient(circle at center, black 40%, transparent 100%);
            -webkit-mask-image: radial-gradient(circle at center, black 40%, transparent 100%);
        }
    </style>
</head>

<body class="relative min-h-screen font-sans flex items-center justify-center overflow-hidden bg-slate-950 text-slate-300">

    <div class="absolute inset-0 z-0">
        <img src="https://images.unsplash.com/photo-1550751827-4bd374c3f58b?q=80&w=2670&auto=format&fit=crop" 
             alt="Cybersecurity Background" 
             class="w-full h-full object-cover opacity-20">
    </div>

    <div class="absolute inset-0 z-0 cyber-grid"></div>

    <div class="absolute inset-0 z-0 bg-[radial-gradient(circle_at_center,transparent_0%,#020617_100%)]"></div>

    <div class="relative z-10 w-full max-w-md px-4">
        
        <div class="bg-slate-900/60 backdrop-blur-xl border border-slate-700/50 rounded-2xl shadow-2xl p-8 md:p-10 animate-fade-in ring-1 ring-white/10">

            <div class="text-center mb-8">
                <div class="inline-block mb-4 p-3 rounded-full bg-slate-800/80 border border-slate-700 shadow-lg shadow-black/50">
                    <i class="fas fa-user-shield text-3xl text-red-600"></i>
                </div>
                <h1 class="text-4xl font-black italic uppercase tracking-tighter text-white drop-shadow-2xl">
                    WAFA<span class="text-red-600">HELL</span>
                </h1>
                <div class="flex items-center justify-center gap-2 mt-3 opacity-80">
                    <div class="h-[1px] w-6 bg-red-900/50"></div>
                    <p class="text-red-500 text-[9px] font-bold tracking-[0.3em] uppercase glow-text">
                        Restricted Access
                    </p>
                    <div class="h-[1px] w-6 bg-red-900/50"></div>
                </div>
            </div>

            {% with messages = get_flashed_messages() %}
              {% if messages %}
                {% for message in messages %}
                  <div class="mb-6 p-3 rounded bg-red-500/10 border border-red-500/50 text-red-400 text-xs font-bold flex items-center gap-3 shadow-lg shadow-red-900/20 animate-pulse">
                    <i class="fas fa-triangle-exclamation"></i>
                    {{ message }}
                  </div>
                {% endfor %}
              {% endif %}
            {% endwith %}

            <form method="POST" class="space-y-5">

                <div class="group">
                    <label class="block text-[10px] uppercase font-bold text-slate-400 mb-1.5 ml-1">
                        ID Operacional
                    </label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                            <i class="fas fa-user text-slate-500 text-sm group-focus-within:text-red-500 transition-colors"></i>
                        </div>
                        <input
                            type="text"
                            name="user"
                            required
                            class="w-full bg-slate-950/60 border border-slate-700 rounded-lg pl-10 pr-4 py-3 text-sm text-slate-200 placeholder-slate-600
                                   focus:border-red-600 focus:ring-1 focus:ring-red-600/50 outline-none transition-all duration-300 shadow-inner"
                            placeholder="username"
                            autocomplete="off"
                        >
                    </div>
                </div>

                <div class="group">
                    <label class="block text-[10px] uppercase font-bold text-slate-400 mb-1.5 ml-1">
                        Credencial
                    </label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                            <i class="fas fa-lock text-slate-500 text-sm group-focus-within:text-red-500 transition-colors"></i>
                        </div>
                        <input
                            type="password"
                            name="password"
                            required
                            class="w-full bg-slate-950/60 border border-slate-700 rounded-lg pl-10 pr-4 py-3 text-sm text-slate-200 placeholder-slate-600
                                   focus:border-red-600 focus:ring-1 focus:ring-red-600/50 outline-none transition-all duration-300 shadow-inner"
                            placeholder="••••••••••••"
                        >
                    </div>
                </div>

                <button
                    type="submit"
                    class="w-full bg-gradient-to-r from-red-800 to-red-600 hover:from-red-700 hover:to-red-500 
                           text-white font-bold uppercase tracking-wider text-xs border border-red-500/30
                           py-3.5 rounded-lg shadow-[0_0_15px_rgba(220,38,38,0.3)]
                           transform hover:-translate-y-0.5 active:translate-y-0 transition-all duration-200 mt-4 flex items-center justify-center gap-2 group"
                >
                    <i class="fas fa-fingerprint group-hover:text-red-200 transition-colors"></i> Autenticar
                </button>

            </form>

            <div class="mt-8 text-center border-t border-slate-800/50 pt-4">
                <p class="text-[9px] text-slate-500 uppercase tracking-widest flex items-center justify-center gap-1.5">
                    <span class="w-1.5 h-1.5 rounded-full bg-emerald-500 animate-pulse"></span>
                    System Secured & Encrypted
                </p>
                <p class="text-[9px] text-slate-600 mt-1 font-mono">Client IP: {{ request.remote_addr }}</p>
            </div>

        </div>
    </div>

</body>
</html>
